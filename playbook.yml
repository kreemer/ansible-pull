---
- name: Playbook
  hosts: localhost
  tasks:
    - name: Stamp new file
      ansible.builtin.file:
        path: "/lastrun"
        owner: root
        group: root
        state: touch
      become: true

    - name: Cron tasks
      ansible.builtin.include_tasks: tasks/cron.yml

    - name: Docker tasks
      ansible.builtin.include_tasks: tasks/docker.yml
